# =============================================================
# NOERMS Docker Compose — Full Stack (OPTIONAL)
# Primary supported path is mvn + java -jar (see README.md).
# This Compose file is provided for convenience only.
# Redis is OFF by default — backend works without it.
# =============================================================

services:

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: noerms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-noerms}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-noerms_secure_2024}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/data_population.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-noerms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noerms-net

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noerms-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-noerms}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-noerms_secure_2024}
      JPA_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:-noerms-default-secret-key-university-buea-cef476-2024-at-least-64-chars}
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - noerms-net

  # ── Nginx + Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noerms-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - noerms-net

  # ── Redis (OPTIONAL — uncomment to enable caching) ─────────
  # To use: 1) uncomment this service  2) add spring-boot-starter-data-redis
  # to backend/pom.xml  3) set spring.cache.type=redis in application.properties
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: noerms-redis
  #   restart: unless-stopped
  #   command: redis-server --requirepass ${REDIS_PASSWORD:-noerms_redis_2024}
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - noerms-net

volumes:
  postgres_data:
  # redis_data:

networks:
  noerms-net:
    driver: bridge
